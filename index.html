<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>星際大冒險 - Interstellar Adventure</title>

  <!-- Firebase V8 Compat -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <!-- QRCode.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #gameWrapper {
      position: relative;
      /* JS will set the size */
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }
  </style>
</head>

<body>
  <div id="gameWrapper">
    <canvas id="gameCanvas"></canvas>

    <!-- QR Code for Host Mode -->
    <div id="qrContainer"
      style="position: absolute; top: 20px; right: 20px; background: white; padding: 10px; display: none; border-radius: 8px; z-index: 100;">
      <div id="qrcode"></div>
      <div
        style="font-family: monospace; text-align: center; margin-top: 5px; color: black; font-weight: bold; font-size: 14px;">
        手機掃碼控制!</div>
    </div>
  </div>

  <!-- Mobile Controller UI -->
  <div id="controllerUI"
    style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; color: #0af; flex-direction: column; align-items: center; justify-content: center; font-size: 3rem; font-weight: bold; font-family: monospace; user-select: none; z-index: 999; touch-action: manipulation;">
    <div style="font-size: 1.2rem; color: #888; margin-bottom: 20px;">Room: <span id="ctrlRoomID">----</span></div>
    <div id="tapBtn"
      style="border: 4px solid #0af; border-radius: 50%; width: 220px; height: 220px; display: flex; align-items: center; justify-content: center; background: rgba(0, 170, 255, 0.1); box-shadow: 0 0 30px rgba(0,170,255,0.4);">
      🚀
    </div>
    <div style="margin-top: 30px; font-size: 2rem;">TAP TO FLY</div>
  </div>

  <script>
    // ─────────────────────────────────────────────
    //  FIREBASE & MOBILE CONTROLLER SETUP
    // ─────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyBURJoBAAA9TZ6dQvZDstiVBBY7XoqdhrA",
      authDomain: "star-adventure-game.firebaseapp.com",
      databaseURL: "https://star-adventure-game-default-rtdb.asia-southeast1.firebasedatabase.app/", // Asia-Southeast1 region
      projectId: "star-adventure-game",
      storageBucket: "star-adventure-game.firebasestorage.app",
      messagingSenderId: "546180888124",
      appId: "1:546180888124:web:b8b4c3e9032194291c7539"
    };

    if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
      firebase.initializeApp(firebaseConfig);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const roomIDParam = urlParams.get('room');
    const isControllerMode = (mode === 'controller' && roomIDParam);

    if (isControllerMode) {
      // --- CONTROLLER MODE ---
      document.getElementById('gameWrapper').style.display = 'none';
      const ctrlUI = document.getElementById('controllerUI');
      ctrlUI.style.display = 'flex';
      document.getElementById('ctrlRoomID').innerText = roomIDParam;

      const handleTap = (e) => {
        e.preventDefault();
        const btn = document.getElementById('tapBtn');
        btn.style.background = 'rgba(0, 170, 255, 0.5)';
        setTimeout(() => btn.style.background = 'rgba(0, 170, 255, 0.1)', 100);

        if (firebase.apps.length > 0) {
          firebase.database().ref('rooms/' + roomIDParam + '/jump_timestamp').set(Date.now())
            .then(() => console.log("Thrust sent successfully"))
            .catch(err => {
              console.error("Firebase Write Error:", err);
              btn.innerText = "❌";
              setTimeout(() => btn.innerText = "🚀", 1000);
            });
        } else {
          console.warn("Firebase not properly initialized. Please add API keys.");
          alert("Firebase 未初始化。");
        }
      };

      ctrlUI.addEventListener('touchstart', handleTap, { passive: false });
      ctrlUI.addEventListener('mousedown', handleTap);
    } else {
      // --- HOST MODE ---
      document.getElementById('qrContainer').style.display = 'block';
      const roomID = Math.random().toString(36).substring(2, 8).toUpperCase();

      const ctrlUrl = window.location.href.split('?')[0] + "?room=" + roomID + "&mode=controller";
      new QRCode(document.getElementById("qrcode"), {
        text: ctrlUrl,
        width: 140,
        height: 140
      });

      if (firebase.apps.length > 0) {
        firebase.database().ref('rooms/' + roomID + '/jump_timestamp').on('value', (snapshot) => {
          const val = snapshot.val();
          console.log("Firebase sync received:", val);
          if (val && typeof player !== "undefined" && player) {
            // Trigger jump logic remotely
            if (gameState === 'start') {
              gameState = 'playing';
              player.thrust();
            } else if (gameState === 'playing') {
              player.thrust();
            }
          }
        }, (err) => {
          console.error("Firebase Read Error:", err);
          alert("Firebase 連線失敗！請檢查資料庫網址與權限設定 (Rules)。");
        });
      } else {
        console.warn("Firebase app not initialized - skipping listener.");
      }
    }

    // ─────────────────────────────────────────────
    //  CONSTANTS & GLOBALS
    // ─────────────────────────────────────────────
    const DESIGN_W = 1920;
    const DESIGN_H = 1080;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('gameWrapper');

    canvas.width = DESIGN_W;
    canvas.height = DESIGN_H;

    // Scale canvas to fit viewport maintaining 16:9
    function resize() {
      const scaleX = window.innerWidth / DESIGN_W;
      const scaleY = window.innerHeight / DESIGN_H;
      const scale = Math.min(scaleX, scaleY);
      wrapper.style.width = DESIGN_W * scale + 'px';
      wrapper.style.height = DESIGN_H * scale + 'px';
      canvas.style.width = DESIGN_W * scale + 'px';
      canvas.style.height = DESIGN_H * scale + 'px';
    }
    window.addEventListener('resize', resize);
    resize();

    // ─────────────────────────────────────────────
    //  UTILITY
    // ─────────────────────────────────────────────
    const rand = (min, max) => Math.random() * (max - min) + min;
    const randI = (min, max) => Math.floor(rand(min, max + 1));

    function hsl(h, s, l, a = 1) {
      return `hsla(${h},${s}%,${l}%,${a})`;
    }

    // ─────────────────────────────────────────────
    //  STAR CLASS  (background – NON-OBSTACLE)
    // ─────────────────────────────────────────────
    class Star {
      constructor() { this.reset(true); }

      reset(randomX = false) {
        this.x = randomX ? rand(0, DESIGN_W) : rand(DESIGN_W, DESIGN_W + 200);
        this.y = rand(0, DESIGN_H);
        this.size = rand(1.5, 4);
        this.hue = randI(0, 360);
        this.alpha = rand(0.3, 1);
        this.alphaDelta = rand(0.005, 0.025) * (Math.random() < 0.5 ? 1 : -1);
        this.type = randI(0, 3); // 0=circle, 1=star5, 2=diamond
        this.speed = rand(0.3, 1.2); // parallax scroll speed
      }

      update() {
        // Flicker
        this.alpha += this.alphaDelta;
        if (this.alpha >= 1) { this.alpha = 1; this.alphaDelta *= -1; }
        if (this.alpha <= 0.1) { this.alpha = 0.1; this.alphaDelta *= -1; }

        if (gameState === 'playing') {
          this.x -= this.speed;
          if (this.x < -10) this.reset(false);
        }
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = hsl(this.hue, 100, 85);
        ctx.translate(this.x, this.y);

        if (this.type === 0) {
          ctx.beginPath();
          ctx.arc(0, 0, this.size, 0, Math.PI * 2);
          ctx.fill();
        } else if (this.type === 1) {
          drawStar5(ctx, 0, 0, this.size * 0.5, this.size * 1.3);
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.moveTo(0, -this.size * 1.5);
          ctx.lineTo(this.size * 0.6, 0);
          ctx.lineTo(0, this.size * 1.5);
          ctx.lineTo(-this.size * 0.6, 0);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function drawStar5(ctx, cx, cy, r1, r2) {
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const angle = (Math.PI / 5) * i - Math.PI / 2;
        const r = i % 2 === 0 ? r2 : r1;
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
    }

    // ─────────────────────────────────────────────
    //  GEAR CLASS  (obstacle)
    // ─────────────────────────────────────────────
    class Gear {
      constructor(x, y, r, teeth, speed, hue) {
        this.x = x;
        this.y = y;
        this.r = r;        // outer radius
        this.teeth = teeth;
        this.angle = rand(0, Math.PI * 2);
        this.speed = speed;    // rotation speed rad/frame
        this.hue = hue;
        this.scrollSpeed = rand(0.5, 1.0);
        this.bobAmp = rand(0, 30);
        this.bobSpeed = rand(0.02, 0.05);
        this.bobOff = rand(0, Math.PI * 2);
        this.baseY = y;
        this.active = true;
      }

      get collisionRadius() { return this.r * 0.85; }

      update(dt) {
        this.angle += this.speed;
        if (gameState === 'playing') {
          this.x -= this.scrollSpeed;
          this.y = this.baseY + Math.sin(Date.now() * this.bobSpeed * 0.001 + this.bobOff) * this.bobAmp;
        }
        if (this.x + this.r < -20) this.active = false;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        const r2 = this.r * 0.65;
        const r1 = this.r;
        const n = this.teeth;

        // Body gradient - Make it 3D and vibrant
        const grd = ctx.createRadialGradient(-r1 * 0.2, -r1 * 0.2, r2 * 0.1, 0, 0, r1);
        grd.addColorStop(0, hsl(this.hue, 100, 70));
        grd.addColorStop(0.4, hsl(this.hue, 100, 45));
        grd.addColorStop(1, hsl(this.hue, 100, 20));
        ctx.fillStyle = grd;
        ctx.strokeStyle = hsl(this.hue, 90, 85);
        ctx.lineWidth = 3;

        // 3D Shadow
        ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
        ctx.shadowBlur = 15;
        ctx.shadowOffsetX = 10;
        ctx.shadowOffsetY = 10;

        // Draw gear teeth
        ctx.beginPath();
        for (let i = 0; i < n * 2; i++) {
          const angle = (Math.PI * 2 * i) / (n * 2);
          const r = i % 2 === 0 ? r1 : r2;
          const x = r * Math.cos(angle);
          const y = r * Math.sin(angle);
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Reset shadow for inner parts
        ctx.shadowColor = 'transparent';

        // Inner hole
        ctx.beginPath();
        ctx.arc(0, 0, r2 * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = '#111';
        ctx.fill();
        ctx.strokeStyle = hsl(this.hue, 60, 80);
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Cross spokes
        ctx.strokeStyle = hsl(this.hue, 60, 60);
        ctx.lineWidth = 3;
        for (let s = 0; s < 4; s++) {
          const a = (Math.PI / 2) * s;
          ctx.beginPath();
          ctx.moveTo(r2 * 0.3 * Math.cos(a), r2 * 0.3 * Math.sin(a));
          ctx.lineTo(r2 * 0.9 * Math.cos(a), r2 * 0.9 * Math.sin(a));
          ctx.stroke();
        }

        ctx.restore();
      }
    }

    // ─────────────────────────────────────────────
    //  PIPE WALL CLASS  (obstacle – top/bottom barriers with gap)
    // ─────────────────────────────────────────────
    class PipeWall {
      constructor(x, gapY, gapH) {
        this.x = x;
        this.w = 70;
        this.gapY = gapY;
        this.gapH = gapH;
        this.scrollSpeed = 0.93;
        this.active = true;
        this.hue = randI(0, 360); // Full vibrant colorful range
      }

      update() {
        if (gameState === 'playing') {
          this.x -= this.scrollSpeed;
        }
        if (this.x + this.w < -10) this.active = false;
      }

      draw() {
        const drawSegment = (yTop, yBot) => {
          const h = yBot - yTop;
          if (h <= 0) return;
          ctx.save();
          // Drop shadow for 3D depth
          ctx.shadowColor = 'rgba(0,0,0,0.8)';
          ctx.shadowBlur = 15;
          ctx.shadowOffsetX = -8;

          const grd = ctx.createLinearGradient(this.x, 0, this.x + this.w, 0);
          grd.addColorStop(0, hsl(this.hue, 100, 25));
          grd.addColorStop(0.2, hsl(this.hue, 100, 60)); // bright specular highlight
          grd.addColorStop(0.5, hsl(this.hue, 90, 45));
          grd.addColorStop(1, hsl(this.hue, 100, 15));

          ctx.fillStyle = grd;
          ctx.fillRect(this.x, yTop, this.w, h);
          ctx.restore();

          // Highlights (extra glossy)
          ctx.fillStyle = hsl(this.hue, 100, 85, 0.6);
          ctx.fillRect(this.x + 6, yTop, 6, h);
          ctx.fillStyle = 'rgba(255,255,255,0.4)';
          ctx.fillRect(this.x + 8, yTop, 3, h);

          // Pipe caps
          const capH = 24;
          const capW = this.w + 16;
          const capX = this.x - 8;

          const capGrd = ctx.createLinearGradient(capX, 0, capX + capW, 0);
          capGrd.addColorStop(0, hsl(this.hue, 100, 30));
          capGrd.addColorStop(0.2, hsl(this.hue, 100, 70));
          capGrd.addColorStop(0.5, hsl(this.hue, 90, 50));
          capGrd.addColorStop(1, hsl(this.hue, 100, 20));

          ctx.save();
          ctx.shadowColor = 'rgba(0,0,0,0.8)';
          ctx.shadowBlur = 10;
          ctx.shadowOffsetY = yTop > 0 ? -5 : 5;

          ctx.fillStyle = capGrd;
          if (yTop > 0) {
            ctx.fillRect(capX, yBot - capH, capW, capH);
            // Cap specular highlight
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fillRect(capX + 10, yBot - capH, 4, capH);
            ctx.fillStyle = hsl(this.hue, 100, 80);
            ctx.fillRect(capX, yBot - capH, capW, 4);
          } else {
            ctx.fillRect(capX, yTop, capW, capH);
            // Cap specular highlight
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fillRect(capX + 10, yTop, 4, capH);
            ctx.fillStyle = hsl(this.hue, 100, 80);
            ctx.fillRect(capX, yTop + capH - 4, capW, 4);
          }
          ctx.restore();
        };

        // Top segment
        drawSegment(0, this.gapY);
        // Bottom segment
        drawSegment(this.gapY + this.gapH, DESIGN_H);
      }

      collides(player) {
        const px = player.x, py = player.y, pr = player.collisionRadius;
        // Only check if within x range
        if (px + pr < this.x || px - pr > this.x + this.w) return false;
        // Check top pipe
        if (py - pr < this.gapY) return true;
        // Check bottom pipe
        if (py + pr > this.gapY + this.gapH) return true;
        return false;
      }
    }

    // ─────────────────────────────────────────────
    //  TELEPORT PIPE CLASS (entrance/exit pairs)
    // ─────────────────────────────────────────────
    class TeleportPipe {
      constructor(x, y, isEntrance, partnerId) {
        this.x = x;
        this.y = y;
        this.w = 80;
        this.h = 80;
        this.isEntrance = isEntrance;
        this.partnerId = partnerId;  // index into teleportPipes array
        this.scrollSpeed = 0.8;
        this.active = true;
        this.hue = isEntrance ? 45 : 280; // gold = entrance, purple = exit
        this.pulse = 0;
      }

      get cx() { return this.x + this.w / 2; }
      get cy() { return this.y + this.h / 2; }
      get collisionRadius() { return this.w * 0.4; }

      update() {
        if (gameState === 'playing') {
          this.x -= this.scrollSpeed;
        }
        this.pulse = (this.pulse + 0.05) % (Math.PI * 2);
        if (this.x + this.w < -20) this.active = false;
      }

      draw() {
        ctx.save();
        ctx.translate(this.cx, this.cy);

        const glow = 8 + Math.sin(this.pulse) * 4;
        ctx.shadowColor = hsl(this.hue, 100, 60);
        ctx.shadowBlur = glow * 4;

        // Outer ring
        ctx.beginPath();
        ctx.arc(0, 0, this.w / 2, 0, Math.PI * 2);
        const grd = ctx.createRadialGradient(0, 0, 5, 0, 0, this.w / 2);
        grd.addColorStop(0, hsl(this.hue, 100, 80, 0.9));
        grd.addColorStop(0.6, hsl(this.hue, 90, 40, 0.7));
        grd.addColorStop(1, hsl(this.hue, 80, 20, 0.4));
        ctx.fillStyle = grd;
        ctx.fill();

        // Label
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.isEntrance ? 'IN' : 'OUT', 0, 0);

        ctx.restore();
      }

      contains(player) {
        const dx = player.x - this.cx;
        const dy = player.y - this.cy;
        return Math.sqrt(dx * dx + dy * dy) < this.collisionRadius + 5;
      }
    }

    // ─────────────────────────────────────────────
    //  PORTAL CLASS  (win condition)
    // ─────────────────────────────────────────────
    class Portal {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.r = 90;
        this.angle = 0;
        this.active = true;
        this.scrollSpeed = 0.66;
      }

      update() {
        this.angle += 0.03;
        if (gameState === 'playing') this.x -= this.scrollSpeed;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);

        // Outer glow rings
        for (let i = 4; i > 0; i--) {
          ctx.beginPath();
          ctx.arc(0, 0, this.r + i * 15, 0, Math.PI * 2);
          ctx.strokeStyle = hsl(180 + i * 20, 100, 60, 0.15 * (5 - i));
          ctx.lineWidth = 6;
          ctx.stroke();
        }

        // Swirling gradient
        const grd = ctx.createRadialGradient(0, 0, 10, 0, 0, this.r);
        grd.addColorStop(0, 'rgba(255,255,255,0.9)');
        grd.addColorStop(0.3, hsl(200, 100, 70, 0.8));
        grd.addColorStop(0.7, hsl(270, 100, 50, 0.6));
        grd.addColorStop(1, hsl(300, 100, 30, 0.1));
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Spiral lines
        ctx.rotate(this.angle);
        for (let s = 0; s < 5; s++) {
          ctx.save();
          ctx.rotate((Math.PI * 2 / 5) * s);
          ctx.beginPath();
          ctx.moveTo(0, 0);
          for (let t = 0; t < 60; t++) {
            const a = (t / 60) * Math.PI * 3;
            const r = (t / 60) * this.r * 0.9;
            ctx.lineTo(r * Math.cos(a), r * Math.sin(a));
          }
          ctx.strokeStyle = hsl(180 + s * 30, 100, 85, 0.5);
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.restore();
        }

        ctx.restore();
      }

      collides(player) {
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        return Math.sqrt(dx * dx + dy * dy) < this.r * 0.7;
      }
    }

    // ─────────────────────────────────────────────
    //  PLAYER CLASS  (spaceship)
    // ─────────────────────────────────────────────
    class Player {
      constructor() { this.reset(); }

      reset() {
        this.x = DESIGN_W * 0.22;
        this.y = DESIGN_H / 2;
        this.vy = 0;
        this.gravity = 0.005;
        this.thrustPow = -0.66;
        this.maxVy = 2;
        this.w = 72;
        this.h = 36;
        this.angle = 0;
        this.flamePhase = 0;
        this.shielded = false;        // used after teleport
        this.shieldTick = 0;
        this.teleportCooldown = 0;
      }

      get collisionRadius() { return 16; }

      thrust() {
        this.vy = this.thrustPow;
      }

      update() {
        this.vy = Math.min(this.vy + this.gravity, this.maxVy);
        this.y += this.vy;
        // Tilt based on velocity
        this.angle = Math.max(-0.35, Math.min(0.55, this.vy * 0.04));
        this.flamePhase += 0.3;
        if (this.shielded) {
          this.shieldTick--;
          if (this.shieldTick <= 0) this.shielded = false;
        }
        if (this.teleportCooldown > 0) this.teleportCooldown--;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        const w2 = this.w / 2;
        const h2 = this.h / 2;

        // Engine flame
        const flameLen = 20 + Math.abs(Math.sin(this.flamePhase)) * 30;
        const flamePts = [
          [-w2 - flameLen, -4],
          [-w2 - flameLen - rand(-5, 5), 0],
          [-w2 - flameLen, 4],
          [-w2, h2 * 0.6],
        ];
        ctx.beginPath();
        ctx.moveTo(-w2, -h2 * 0.5);
        for (const p of flamePts) ctx.lineTo(...p);
        ctx.closePath();
        const flameGrd = ctx.createLinearGradient(-w2 - flameLen, 0, -w2, 0);
        flameGrd.addColorStop(0, 'rgba(255,200,50,0)');
        flameGrd.addColorStop(0.3, 'rgba(255,120,0,0.8)');
        flameGrd.addColorStop(1, 'rgba(255,255,150,1)');
        ctx.fillStyle = flameGrd;
        ctx.fill();

        // Main body
        ctx.beginPath();
        ctx.moveTo(w2, 0);
        ctx.lineTo(w2 * 0.6, -h2);
        ctx.lineTo(-w2, -h2 * 0.7);
        ctx.lineTo(-w2, h2 * 0.7);
        ctx.lineTo(w2 * 0.6, h2);
        ctx.closePath();
        const bodyGrd = ctx.createLinearGradient(-w2, 0, w2, 0);
        bodyGrd.addColorStop(0, '#1a3a6b');
        bodyGrd.addColorStop(0.5, '#2a6eb5');
        bodyGrd.addColorStop(1, '#1a3a6b');
        ctx.fillStyle = bodyGrd;
        ctx.fill();
        ctx.strokeStyle = '#5bf';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Cockpit dome
        ctx.beginPath();
        ctx.arc(w2 * 0.05, 0, h2 * 0.55, 0, Math.PI * 2);
        const domeGrd = ctx.createRadialGradient(-3, -5, 1, 0, 0, h2 * 0.55);
        domeGrd.addColorStop(0, 'rgba(180,240,255,0.95)');
        domeGrd.addColorStop(0.6, 'rgba(50,130,210,0.7)');
        domeGrd.addColorStop(1, 'rgba(10,40,90,0.4)');
        ctx.fillStyle = domeGrd;
        ctx.fill();
        ctx.strokeStyle = '#aef';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Wing
        ctx.beginPath();
        ctx.moveTo(-w2 * 0.2, h2 * 0.5);
        ctx.lineTo(-w2 * 0.6, h2 * 1.5);
        ctx.lineTo(w2 * 0.1, h2 * 0.9);
        ctx.closePath();
        ctx.fillStyle = '#163060';
        ctx.fill();
        ctx.strokeStyle = '#5bf';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Shield circle
        if (this.shielded) {
          ctx.beginPath();
          ctx.arc(0, 0, 45, 0, Math.PI * 2);
          ctx.strokeStyle = hsl(200, 100, 70, 0.6);
          ctx.lineWidth = 3;
          ctx.setLineDash([8, 4]);
          ctx.stroke();
          ctx.setLineDash([]);
        }

        ctx.restore();
      }
    }

    // ─────────────────────────────────────────────
    //  DECORATIVE BACKGROUND ELEMENTS (non-obstacle)
    // ─────────────────────────────────────────────
    class BgGear {
      constructor() { this.init(); }
      init(atRight = false) {
        this.x = atRight ? rand(DESIGN_W + 50, DESIGN_W + 400) : rand(0, DESIGN_W);
        this.y = rand(50, DESIGN_H - 50);
        this.r = rand(25, 80);
        this.teeth = randI(6, 14);
        this.angle = rand(0, Math.PI * 2);
        this.speed = rand(0.005, 0.02) * (Math.random() < 0.5 ? 1 : -1);
        this.hue = randI(0, 360);
        this.alpha = rand(0.08, 0.20);
        this.scrollSpeed = rand(0.2, 0.6);
      }

      update() {
        this.angle += this.speed;
        if (gameState === 'playing') {
          this.x -= this.scrollSpeed;
          if (this.x + this.r < -20) this.init(true);
        }
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        const r2 = this.r * 0.65;
        ctx.beginPath();
        for (let i = 0; i < this.teeth * 2; i++) {
          const a = (Math.PI * 2 * i) / (this.teeth * 2);
          const r = i % 2 === 0 ? this.r : r2;
          const x = r * Math.cos(a), y = r * Math.sin(a);
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.strokeStyle = hsl(this.hue, 80, 70);
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
      }
    }

    // ─────────────────────────────────────────────
    //  LEVEL / MAP GENERATION
    // ─────────────────────────────────────────────
    // We define a virtual world length and place obstacles procedurally.
    // "worldX" is how far the player has scrolled in design pixels.

    const WORLD_LENGTH = 28000;  // total world width
    let worldX = 0;
    let nextObstacleX = 1200;    // next x (in world space) to spawn obstacle

    function spawnObstacles() {
      if (gameState !== 'playing') return;
      const screenRight = worldX + DESIGN_W;
      while (nextObstacleX < screenRight + 500) {
        const wx = nextObstacleX;
        const screenX = wx - worldX + DESIGN_W;

        if (wx > WORLD_LENGTH - 2000) {
          // Final stretch – only portal
          if (!portalSpawned && wx > WORLD_LENGTH - 1200) {
            portal = new Portal(screenX, DESIGN_H / 2);
            portalSpawned = true;
          }
          nextObstacleX += 600;
          continue;
        }

        const type = Math.random();
        if (type < 0.55) {
          // Pipe wall
          const gapH = rand(260, 380);
          const gapY = rand(60, DESIGN_H - 60 - gapH);
          pipeWalls.push(new PipeWall(screenX, gapY, gapH));
          nextObstacleX += rand(480, 720);
        } else if (type < 0.82) {
          // Gears
          const count = randI(1, 3);
          for (let i = 0; i < count; i++) {
            const r = rand(40, 90);
            gears.push(new Gear(
              screenX + i * rand(120, 200),
              rand(r + 20, DESIGN_H - r - 20),
              r,
              randI(6, 12),
              rand(0.01, 0.04) * (Math.random() < 0.5 ? 1 : -1),
              randI(0, 360)
            ));
          }
          nextObstacleX += rand(350, 600);
        } else {
          // Teleport pair
          if (teleportPipes.length < 6 && Math.random() < 0.6) {
            const ey = rand(150, DESIGN_H - 150);
            const exitX = screenX + rand(400, 700);
            const exitY = rand(150, DESIGN_H - 150);
            const idx = teleportPipes.length;
            teleportPipes.push(new TeleportPipe(screenX, ey, true, idx + 1));
            teleportPipes.push(new TeleportPipe(exitX, exitY, false, idx));
          }
          nextObstacleX += rand(600, 900);
        }
      }
    }

    // ─────────────────────────────────────────────
    //  GAME STATE
    // ─────────────────────────────────────────────
    let gameState = 'start'; // 'start' | 'playing' | 'gameover' | 'win'
    let player, stars, bgGears, gears, pipeWalls, teleportPipes, portal;
    let portalSpawned = false;
    let distance = 0;
    let restartTimer = 0;

    function initGame() {
      player = new Player();
      worldX = 0;
      nextObstacleX = 1200;
      distance = 0;
      portalSpawned = false;

      stars = Array.from({ length: 200 }, () => new Star());
      bgGears = Array.from({ length: 18 }, () => new BgGear());
      gears = [];
      pipeWalls = [];
      teleportPipes = [];
      portal = null;
    }

    initGame();

    // ─────────────────────────────────────────────
    //  INPUT
    // ─────────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => {
      if (e.code === 'ArrowUp' || e.code === 'Space') {
        e.preventDefault();
        keys[e.code] = true;
        if (gameState === 'start') {
          gameState = 'playing';
          player.thrust();
        } else if (gameState === 'playing') {
          player.thrust();
        }
      }
    });
    window.addEventListener('keyup', e => {
      keys[e.code] = false;
    });

    // Touch support
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      if (gameState === 'start') {
        gameState = 'playing';
        player.thrust();
      } else if (gameState === 'playing') {
        player.thrust();
      }
    });

    // ─────────────────────────────────────────────
    //  COLLISION HELPERS
    // ─────────────────────────────────────────────
    function circleCircle(ax, ay, ar, bx, by, br) {
      const dx = ax - bx, dy = ay - by;
      return dx * dx + dy * dy < (ar + br) * (ar + br);
    }

    // ─────────────────────────────────────────────
    //  DRAW HUD
    // ─────────────────────────────────────────────
    function drawHUD() {
      const pct = Math.min(worldX / (WORLD_LENGTH - 2000), 1);
      // Progress bar
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(DESIGN_W * 0.1, 30, DESIGN_W * 0.8, 18);
      const barGrd = ctx.createLinearGradient(DESIGN_W * 0.1, 0, DESIGN_W * 0.9, 0);
      barGrd.addColorStop(0, '#0af');
      barGrd.addColorStop(1, '#f0f');
      ctx.fillStyle = barGrd;
      ctx.fillRect(DESIGN_W * 0.1, 30, DESIGN_W * 0.8 * pct, 18);
      ctx.strokeStyle = '#5bf';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(DESIGN_W * 0.1, 30, DESIGN_W * 0.8, 18);

      ctx.fillStyle = '#aef';
      ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`距離: ${Math.floor(worldX / 100)} ly`, DESIGN_W * 0.1, 66);

      ctx.textAlign = 'right';
      ctx.fillText('傳送門 ⭐', DESIGN_W * 0.9, 66);
    }

    // ─────────────────────────────────────────────
    //  DRAW START SCREEN
    // ─────────────────────────────────────────────
    function drawStart() {
      // Stars still draw (already done in game loop)
      ctx.save();

      // Title glow
      ctx.shadowColor = '#0af';
      ctx.shadowBlur = 40;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 120px "Arial", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('星際大冒險', DESIGN_W / 2, DESIGN_H / 2 - 80);

      ctx.shadowBlur = 0;
      ctx.font = '42px "Arial", sans-serif';
      ctx.fillStyle = hsl(190, 100, 75);
      ctx.fillText('INTERSTELLAR ADVENTURE', DESIGN_W / 2, DESIGN_H / 2 + 20);

      // Blinking prompt
      if (Math.floor(Date.now() / 600) % 2 === 0) {
        ctx.fillStyle = '#fff';
        ctx.font = '38px monospace';
        ctx.fillText('按上方向鍵 / 空白鍵 / 點擊 開始', DESIGN_W / 2, DESIGN_H / 2 + 120);
      }

      ctx.restore();
    }

    // ─────────────────────────────────────────────
    //  DRAW WIN SCREEN
    // ─────────────────────────────────────────────
    function drawWin() {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

      ctx.shadowColor = '#0ff';
      ctx.shadowBlur = 60;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 160px "Arial", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('You Win!', DESIGN_W / 2, DESIGN_H / 2 - 60);

      ctx.shadowBlur = 0;
      ctx.font = '48px "Arial", sans-serif';
      ctx.fillStyle = hsl(60, 100, 70);
      ctx.fillText('🚀 已抵達星際傳送門！', DESIGN_W / 2, DESIGN_H / 2 + 70);

      ctx.fillStyle = hsl(200, 100, 75);
      ctx.font = '34px monospace';
      ctx.fillText(`探索距離: ${Math.floor(worldX / 100)} 光年`, DESIGN_W / 2, DESIGN_H / 2 + 140);
      ctx.restore();
    }

    // ─────────────────────────────────────────────
    //  MAIN UPDATE
    // ─────────────────────────────────────────────
    function update() {
      if (gameState === 'playing') {
        worldX += 0.83;
        spawnObstacles();

        player.update();

        // Boundary check (top/bottom)
        if (player.y - player.collisionRadius < 0 || player.y + player.collisionRadius > DESIGN_H) {
          triggerGameOver();
          return;
        }

        // Update obstacles
        gears.forEach(g => g.update());
        pipeWalls.forEach(pw => pw.update());
        teleportPipes.forEach(tp => tp.update());
        if (portal) portal.update();

        // Purge offscreen
        gears = gears.filter(g => g.active);
        pipeWalls = pipeWalls.filter(g => g.active);
        teleportPipes = teleportPipes.filter(g => g.active);

        // Collision – gears  (stars excluded by design – not in collision list)
        if (!player.shielded) {
          for (const g of gears) {
            if (circleCircle(player.x, player.y, player.collisionRadius,
              g.x, g.y, g.collisionRadius)) {
              triggerGameOver(); return;
            }
          }
          // Collision – pipe walls
          for (const pw of pipeWalls) {
            if (pw.collides(player)) { triggerGameOver(); return; }
          }
        }

        // Teleport entrance
        if (player.teleportCooldown <= 0) {
          for (let i = 0; i < teleportPipes.length; i++) {
            const tp = teleportPipes[i];
            if (tp.isEntrance && tp.active && tp.contains(player)) {
              // Find exit
              const exit = teleportPipes.find((t, idx) => !t.isEntrance && t.partnerId === i);
              if (exit && exit.active) {
                player.x = exit.cx;
                player.y = exit.cy;
                player.vy = Math.min(player.vy, 0); // preserve upward or zero
                player.shielded = true;
                player.shieldTick = 80;
                player.teleportCooldown = 100;
              }
              break;
            }
          }
        }

        // Win condition
        if (portal && portal.collides(player)) {
          gameState = 'win';
        }
      }

      // Background / decorative always update
      stars.forEach(s => s.update());
      bgGears.forEach(g => g.update());
    }

    // ─────────────────────────────────────────────
    //  GAME OVER
    // ─────────────────────────────────────────────
    function triggerGameOver() {
      gameState = 'gameover';
      restartTimer = 90; // frames
    }

    // ─────────────────────────────────────────────
    //  RENDER
    // ─────────────────────────────────────────────
    function render() {
      // Background
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

      // Stars (non-obstacle)
      stars.forEach(s => s.draw());

      // Decorative background gears (non-obstacle)
      bgGears.forEach(g => g.draw());

      if (gameState === 'start') {
        player.draw();   // Show ship on start
        drawStart();
        return;
      }

      // Pipe walls
      pipeWalls.forEach(pw => pw.draw());

      // Teleport pipes
      teleportPipes.forEach(tp => tp.draw());

      // Obstacle gears
      gears.forEach(g => g.draw());

      // Portal
      if (portal) portal.draw();

      // Player
      player.draw();

      if (gameState === 'playing') drawHUD();
      if (gameState === 'win') drawWin();
    }

    // ─────────────────────────────────────────────
    //  GAME LOOP
    // ─────────────────────────────────────────────
    function gameLoop() {
      update();
      render();

      if (gameState === 'gameover') {
        restartTimer--;
        if (restartTimer <= 0) {
          initGame();
          gameState = 'start';
        }
      }

      requestAnimationFrame(gameLoop);
    }

    if (!isControllerMode) {
      requestAnimationFrame(gameLoop);
    }
  </script>
</body>

</html>
